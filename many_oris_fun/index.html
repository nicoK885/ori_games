<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#06050f">
<title>In der Menge</title>
<style>
  html,body{margin:0;padding:0;height:100%;width:100%;background:#06050f;}
  html,body{position:fixed;inset:0;overflow:hidden;overscroll-behavior:none;
    -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent;}
  canvas{display:block;width:100%;height:100%;touch-action:none;}
  #hint{position:fixed;left:50%;top:calc(env(safe-area-inset-top,0px) + 22px);transform:translateX(-50%);
    color:rgba(222,224,255,0.52);font:13px -apple-system,system-ui,sans-serif;letter-spacing:.02em;
    z-index:5;pointer-events:none;transition:opacity 1.2s ease;text-align:center;text-shadow:0 1px 6px rgba(0,0,0,.5);}
  #hint.hidden{opacity:0;}
  #size{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom,0px) + 20px);transform:translateX(-50%);
    width:min(66vw,330px);height:42px;z-index:6;display:flex;align-items:center;touch-action:none;opacity:.62;transition:opacity .5s ease;}
  #size.active{opacity:1;}
  #track{position:relative;width:100%;height:6px;border-radius:3px;background:rgba(180,190,255,0.16);box-shadow:inset 0 0 6px rgba(0,0,0,.45);}
  #fill{position:absolute;left:0;top:0;height:100%;border-radius:3px;background:linear-gradient(90deg,rgba(150,170,255,.45),rgba(196,210,255,.9));}
  #knob{position:absolute;top:50%;width:26px;height:26px;border-radius:50%;transform:translate(-50%,-50%);
    background:radial-gradient(circle at 35% 30%,#eef2ff,#9fb0ff 55%,#5566cc);box-shadow:0 0 12px rgba(150,170,255,.85),0 2px 6px rgba(0,0,0,.5);}
  #size .lbl{position:absolute;bottom:30px;color:rgba(210,216,255,.45);font:11px -apple-system,system-ui,sans-serif;}
  #size .lbl.l{left:0;} #size .lbl.r{right:0;}
  #snd{position:fixed;right:calc(env(safe-area-inset-right,0px) + 16px);top:calc(env(safe-area-inset-top,0px) + 14px);
    z-index:7;width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;
    background:rgba(150,170,255,0.10);color:rgba(214,222,255,0.78);
    font:18px -apple-system,system-ui,sans-serif;display:flex;align-items:center;justify-content:center;
    -webkit-tap-highlight-color:transparent;transition:background .3s ease,opacity .3s ease;backdrop-filter:blur(4px);}
  #snd:active{background:rgba(150,170,255,0.22);}
  #snd.off{opacity:.5;}
</style>
</head>

<button id="snd" aria-label="Ton an/aus">♪</button>

function initAudio(){
  if(actx) { if(actx.state==='suspended') actx.resume(); return; }
  try{
    actx=new (window.AudioContext||window.webkitAudioContext)();
    noiseBuf=actx.createBuffer(1, actx.sampleRate*2, actx.sampleRate);
    const d=noiseBuf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const src=actx.createBufferSource(); src.buffer=noiseBuf; src.loop=true;
    stirFilter=actx.createBiquadFilter(); stirFilter.type='bandpass'; stirFilter.frequency.value=480; stirFilter.Q.value=0.6;
    stirGain=actx.createGain(); stirGain.gain.value=0.0001;
    src.connect(stirFilter).connect(stirGain).connect(actx.destination); src.start();
  }catch(e){ actx=null; }
}

  const g=actx.createGain(); g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(0.16*s+0.02,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+0.55);
  const f=actx.createBiquadFilter(); f.type='bandpass'; f.Q.value=0.9;
  f.frequency.setValueAtTime(820,t); f.frequency.exponentialRampToValueAtTime(190,t+0.5);
  const n=actx.createBufferSource(); n.buffer=noiseBuf; n.connect(f).connect(g).connect(actx.destination); n.start(t); n.stop(t+0.6);
  const o=actx.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(140,t); o.frequency.exponentialRampToValueAtTime(58,t+0.28);
  const og=actx.createGain(); og.gain.setValueAtTime(0.0001,t); og.gain.exponentialRampToValueAtTime(0.11*s+0.01,t+0.02); og.gain.exponentialRampToValueAtTime(0.0001,t+0.38);
  o.connect(og).connect(actx.destination); o.start(t); o.stop(t+0.42);
}
function grumble(){                   // kurzes Murren, wenn viele wütend werden
  if(!actx||muted) return; const t=actx.currentTime;
  const o=actx.createOscillator(); o.type='sawtooth'; o.frequency.value=rnd(66,104);
  const f=actx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=360;
  const g=actx.createGain(); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.05,t+0.03); g.gain.exponentialRampToValueAtTime(0.0001,t+0.2);
  o.connect(f).connect(g).connect(actx.destination); o.start(t); o.stop(t+0.22);
}
function buzz(ms){ if(navigator.vibrate){ try{ navigator.vibrate(ms); }catch(_){} } }
function spawnShock(x,y,strength){
  const reach=clamp(70+220*strength, 55, Math.min(W,H)*0.5);   // Reichweite hängt von der Stärke ab, nie über den ganzen Schirm
  shocks.push({x,y,t0:performance.now(),str:strength,reach});
}

function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=Math.round(window.innerWidth); H=Math.round(window.innerHeight);
  canvas.width=W*DPR; canvas.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
  buildBackground(); buildStars(); buildCrowd();
}
function buildBackground(){
  bg.width=W*DPR; bg.height=H*DPR; const b=bg.getContext('2d'); b.setTransform(DPR,0,0,DPR,0,0);
  const g=b.createLinearGradient(0,0,0,H); g.addColorStop(0,'#100e26'); g.addColorStop(0.5,'#171338'); g.addColorStop(1,'#08071a');
  b.fillStyle=g; b.fillRect(0,0,W,H);
  const mg=b.createRadialGradient(W*0.78,H*0.16,0,W*0.78,H*0.16,Math.max(W,H)*0.6);
  mg.addColorStop(0,'rgba(120,135,215,0.16)'); mg.addColorStop(1,'rgba(120,135,215,0)');
  b.fillStyle=mg; b.fillRect(0,0,W,H);
  const vg=b.createRadialGradient(W/2,H*0.52,Math.min(W,H)*0.25,W/2,H*0.52,Math.max(W,H)*0.75);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.55)');
  b.fillStyle=vg; b.fillRect(0,0,W,H);
}
function buildStars(){ stars=[]; const n=Math.floor(W*H/2600);
  for(let i=0;i<n;i++) stars.push({x:Math.random()*W,y:Math.random()*H,
    r:Math.random()<0.85?Math.random()*1.1:Math.random()*2, base:rnd(0.18,0.7),ph:Math.random()*6.28,sp:rnd(0.4,1.7)}); }
function buildCrowd(){
  crowd=[]; const area=W*H;
  const target=clamp(Math.floor(area/CONFIG.AREA_PER_FIGURE),200,1300); const s=Math.sqrt(area/target);
  let y=-s*0.3, rIdx=0;
  while(y<H+s){
    const rt=clamp(y/H,0,1); const persp=lerp(0.62,1.08,rt);
    const sx=s*persp, sy=s*persp*0.82, dhRow=sy*2.45; const off=(rIdx%2)*sx*0.5;
    for(let x=-sx*0.3;x<W+sx;x+=sx){
      const fi=pickPose(); const dh=dhRow*rnd(0.82,1.16);
      const hx=x+off+rnd(-sx*0.30,sx*0.30), hy=y+rnd(-sy*0.32,sy*0.32);
      crowd.push({ hx,hy,x:hx,y:hy,vx:0,velx:0,vely:0,
        dh, dw:dh*(FW/CH), fi, flip:Math.random()<0.5?-1:1, a:lerp(0.70,1,rt)*rnd(0.84,1),
        follow:rnd(CONFIG.FOLLOW[0],CONFIG.FOLLOW[1]), inert:rnd(0.30,0.48),
        rf:rnd(-0.18,0.10), swirl:rnd(-0.30,0.30), anger:0,
        wa:persp*rnd(0.6,1.3),                                  // nur SEHR sanfter gemeinsamer Drift
        // zwei langsame, unabhängige Schwingungen pro Achse -> ruhiges, eigenständiges Wandern
        sax:rnd(1.4,3.4)*persp, sfx:rnd(0.10,0.26)*0.001, spx:Math.random()*6.28,
        sax2:rnd(0.6,1.7)*persp, sfx2:rnd(0.05,0.13)*0.001, spx2:Math.random()*6.28,
        say:rnd(0.8,1.8)*persp, sfy:rnd(0.09,0.22)*0.001, spy:Math.random()*6.28,
        say2:rnd(0.4,1.1)*persp, sfy2:rnd(0.05,0.12)*0.001, spy2:Math.random()*6.28,
        bob:rnd(0.012,0.022), bf:rnd(0.5,1.0)*0.001, bp:Math.random()*6.28,
        bsc:rnd(0.006,0.014), bf2:rnd(0.4,0.8)*0.001, bp2:Math.random()*6.28,
        lean:0, leanK:rnd(0.0011,0.0018),
        ilA:rnd(0.012,0.05), ilf:rnd(0.22,0.6)*0.001, ilp:Math.random()*6.28 }); // eigenes leichtes Wiegen
      if(crowd.length>=CONFIG.MAX) break;
    }
    if(crowd.length>=CONFIG.MAX) break; y+=sy; rIdx++;
  }
  crowd.sort((a,b)=>a.hy-b.hy);
}

function step(now){
  for(const [k,p] of pts){ p.str+=(p.tgt-p.str)*CONFIG.OPEN_EASE; if(p.tgt===0&&p.str<0.02) pts.delete(k);
    p.vx*=0.86; p.vy*=0.86; }                          // Wischgeschwindigkeit klingt ab
  const ph=now*0.00045, ph2=now*0.0009, maxS=Math.max(22,R*0.5), REACH=CONFIG.REACH;
  const SS=CONFIG.SHOCK_SPEED, SL=CONFIG.SHOCK_LIFE, SW=CONFIG.SHOCK_PUSH, SWID=CONFIG.SHOCK_WIDTH;
  let frameStir=0, newAngry=0;
  for(const c of crowd){
    const wx=Math.sin(ph + c.hx*0.010 + c.hy*0.006) + 0.5*Math.sin(ph2 + c.hx*0.021 - c.hy*0.013);
    const wy=Math.cos(ph*0.8 + c.hx*0.006 - c.hy*0.011) + 0.5*Math.cos(ph2*0.9 - c.hx*0.015 + c.hy*0.018);
    const baseX=c.hx + wx*c.wa*0.32 + Math.sin(now*c.sfx+c.spx)*c.sax + Math.sin(now*c.sfx2+c.spx2)*c.sax2;
    const baseY=c.hy + wy*c.wa*0.22 + Math.sin(now*c.sfy+c.spy)*c.say + Math.cos(now*c.sfy2+c.spy2)*c.say2;
    const Reff=R*(1+c.rf);
    // ---- DAS LOCH: weiche Hand, zieht die Position (folgt dem Finger, immer flüssig) ----
    let sxp=0, syp=0, maxDisp=0;
    for(const p of pts.values()){
      if(p.str<0.02) continue;
      const rr=Reff*p.str, cutoff=rr*REACH;
      let dx=baseX-p.x, dy=baseY-p.y, d=Math.hypot(dx,dy); if(d<0.001){d=0.001;dx=0.001;}
      if(d>cutoff) continue;
      // flächenerhaltende Verdrängung -> Loch öffnet sauber, Umgebung wölbt sich sanft (kein Knäuel)
      const fall=smooth(clamp((cutoff-d)/(rr*0.9),0,1));
      const disp=(Math.sqrt(d*d+rr*rr)-d) * fall;
      const ux=dx/d, uy=dy/d;
      sxp += (ux - uy*c.swirl)*disp; syp += (uy + ux*c.swirl)*disp;
      // Bugwelle: NUR bei schnellem Wischen, sonst bleibt das Ziehen rein flüssig
      const spd=Math.hypot(p.vx,p.vy);
      if(spd>CONFIG.BOW_MIN){ const m=Math.max(0,(ux*p.vx+uy*p.vy)/spd), bw=CONFIG.BOW*(spd-CONFIG.BOW_MIN)*fall*m;
        sxp += p.vx/spd*bw; syp += p.vy/spd*bw; }
      if(disp>maxDisp) maxDisp=disp;
    }
    const tx=baseX+sxp, ty=baseY+syp;
    const dvx=(tx-c.x)*c.follow, dvy=(ty-c.y)*c.follow;
    c.velx+=(dvx-c.velx)*c.inert; c.vely+=(dvy-c.vely)*c.inert;
    // ---- DIE WELLE: ein durchlaufender STOSS auf die Geschwindigkeit (kein Loch) ----
    // Wenn die Front einen Wichtel erreicht, bekommt er einen kurzen Schubs nach außen
    // und schwingt danach von selbst zurück -> echte, physische Wellen-Optik.
    let shockHit=0;
    for(const sh of shocks){
      const age=now-sh.t0; if(age>SL) continue; const rad=age*SS;
      if(rad>sh.reach) continue;                          // Welle erlischt an ihrer Reichweite
      const radial=1-rad/sh.reach;                        // wird schwächer, je weiter sie läuft
      const f=1-age/SL;
      let dx=c.x-sh.x, dy=c.y-sh.y, d=Math.hypot(dx,dy); if(d<1){d=1;dx=1;}
      const e=(d-rad)/SWID; if(Math.abs(e)>2.2) continue;
      const w=Math.exp(-e*e);
      const kick=R*SW*f*radial*radial*sh.str*w;
      c.velx += dx/d*kick; c.vely += dy/d*kick;
      const hit=w*f*radial*sh.str; if(hit>shockHit) shockHit=hit;
    }
    const sl=Math.hypot(c.velx,c.vely); if(sl>maxS){ c.velx*=maxS/sl; c.vely*=maxS/sl; }
    c.x+=c.velx; c.y+=c.vely; c.vx=c.velx;
    frameStir += maxDisp + shockHit*Reff*0.6;
    // Wut: durch starkes Verdrängen (Loch) ODER einen kräftigen Wellenstoß
    const ta=Math.max(clamp((maxDisp/Reff - 0.30)/0.45,0,1), clamp((shockHit-0.55)/0.4,0,1)), prev=c.anger;
    c.anger += (ta-c.anger)*(ta>c.anger?0.22:0.05);
    if(prev<=0.5 && c.anger>0.5) newAngry++;
    let lt=clamp((c.x-c.hx)*c.leanK + c.vx*0.05, -0.15, 0.15);
    lt += Math.sin(now*c.ilf + c.ilp)*c.ilA;                            // eigenes, ruhiges Wiegen
    if(c.anger>0.04) lt += Math.sin(now*0.045 + c.bp)*0.055*c.anger;   // wütendes Zittern
    c.lean += (lt-c.lean)*0.18;
  }
  stir=frameStir;
  if(newAngry>6 && now>grumbleAt){ grumble(); buzz(12); grumbleAt=now+150; }
}

function render(now){
  ctx.setTransform(1,0,0,1,0,0); ctx.drawImage(bg,0,0); ctx.setTransform(DPR,0,0,DPR,0,0);
  for(const s of stars){ const a=s.base*(0.6+0.4*Math.sin(now*0.001*s.sp+s.ph));
    ctx.fillStyle='rgba(228,230,255,'+a.toFixed(3)+')'; ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.283);ctx.fill(); }
  ctx.save(); ctx.globalCompositeOperation='screen';
  for(const p of pts.values()){ if(p.str<0.02) continue;
    const rr=R*1.7*p.str, a=(0.22*p.str).toFixed(3);
    const lg=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,rr);
    lg.addColorStop(0,'rgba(162,180,255,'+a+')'); lg.addColorStop(0.7,'rgba(162,180,255,'+(0.05*p.str).toFixed(3)+')'); lg.addColorStop(1,'rgba(162,180,255,0)');
    ctx.fillStyle=lg; ctx.beginPath(); ctx.arc(p.x,p.y,rr,0,6.283); ctx.fill(); }
  if(now<previewUntil){ const k=clamp((previewUntil-now)/900,0,1);
    const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,R*1.35);
    g.addColorStop(0,'rgba(162,180,255,'+(0.10*k).toFixed(3)+')'); g.addColorStop(1,'rgba(162,180,255,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(W/2,H/2,R*1.35,0,6.283); ctx.fill();
    ctx.strokeStyle='rgba(186,200,255,'+(0.5*k).toFixed(3)+')'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(W/2,H/2,R,0,6.283); ctx.stroke(); }
  ctx.restore();
  for(const c of crowd){
    const F=FRAMES[c.anger>0.5?ANGRY:c.fi];
    const bob=Math.sin(now*c.bf+c.bp)*c.dh*c.bob;
    const sc=(1+Math.sin(now*c.bf2+c.bp2)*c.bsc)*(1+c.anger*0.05);  // wütend = leicht größer/näher
    ctx.globalAlpha=c.a; ctx.save();
    ctx.translate(c.x, c.y-bob); if(c.lean) ctx.rotate(c.lean); ctx.scale(c.flip<0?-sc:sc, sc);
    ctx.drawImage(sprite, F.sx,F.sy,F.sw,F.sh, -c.dw/2,-c.dh,c.dw,c.dh);
    ctx.restore();
  }
  ctx.globalAlpha=1;
  // --- Wärme-Glühen über wütenden Köpfen + Tap-Wellen als Lichtring (über dem Schwarm) ---
  ctx.save(); ctx.globalCompositeOperation='screen';
  let acap=140;
  for(const c of crowd){ if(c.anger<=0.45) continue; if(acap--<=0) break;
    const rr=c.dw*0.55*c.anger, hx=c.x, hy=c.y-c.dh*0.78, a=(0.20*c.anger).toFixed(3);
    const g=ctx.createRadialGradient(hx,hy,0,hx,hy,rr);
    g.addColorStop(0,'rgba(255,120,96,'+a+')'); g.addColorStop(1,'rgba(255,120,96,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(hx,hy,rr,0,6.283); ctx.fill();
  }
  for(const sh of shocks){ const age=performance.now()-sh.t0, f=1-age/CONFIG.SHOCK_LIFE; if(f<=0) continue;
    const rad=age*CONFIG.SHOCK_SPEED; if(rad>sh.reach) continue;
    const radial=1-rad/sh.reach, a=(0.28*f*radial*radial*sh.str).toFixed(3);
    ctx.strokeStyle='rgba(176,196,255,'+a+')'; ctx.lineWidth=1.2+3.8*f*radial;
    ctx.beginPath(); ctx.arc(sh.x,sh.y,rad,0,6.283); ctx.stroke();
  }
  ctx.restore();
}
function frame(now){
  step(now); render(now);
  if(actx && !muted){
    const target=clamp(stir/(R*60),0,1);                 // normierte Unruhe -> Lautstärke
    stirSmooth += (target-stirSmooth)*0.08;
    stirGain.gain.setTargetAtTime(0.0001+stirSmooth*0.05, actx.currentTime, 0.08);
    stirFilter.frequency.setTargetAtTime(360+stirSmooth*900, actx.currentTime, 0.08);
  } else if(actx){ stirGain.gain.setTargetAtTime(0.0001, actx.currentTime, 0.1); }
  if(!firstTouch && now>nextInvite){ spawnShock(W/2,H*0.52,0.5); nextInvite=now+3600; }  // Lockruf
  for(let i=shocks.length-1;i>=0;i--){ const s=shocks[i], age=now-s.t0;
    if(age>CONFIG.SHOCK_LIFE || age*CONFIG.SHOCK_SPEED>s.reach) shocks.splice(i,1); }
  requestAnimationFrame(frame);
}

function hideHint(){ hintEl.classList.add('hidden'); }
function setPt(key,x,y){ const p=pts.get(key);
  if(p){ p.vx=(x-p.x)*0.5+p.vx*0.5; p.vy=(y-p.y)*0.5+p.vy*0.5; p.x=x; p.y=y; p.tgt=1; }
  else pts.set(key,{x,y,vx:0,vy:0,str:0,tgt:1}); }
function endPt(key){ const p=pts.get(key); if(p) p.tgt=0; }
addEventListener('pointerdown',e=>{ if(e.target!==canvas) return; hideHint(); initAudio(); firstTouch=true;
  setPt(e.pointerType==='mouse'?'mouse':e.pointerId,e.clientX,e.clientY);
  // Stärke variiert je Tap: leichte Zufallswürze + Druck (falls vorhanden) + Combo bei schnellen Taps
  let str = 0.34 + Math.random()*0.34;
  if(e.pressure>0.01 && Math.abs(e.pressure-0.5)>0.001) str *= (0.55+e.pressure*0.95);
  const tnow=performance.now();
  if(tnow-lastTap<450 && Math.hypot(e.clientX-lastTapX,e.clientY-lastTapY)<120) combo=Math.min(combo+1,4); else combo=0;
  str *= (1+combo*0.18); str=clamp(str,0.22,1.1);
  lastTap=tnow; lastTapX=e.clientX; lastTapY=e.clientY;
  spawnShock(e.clientX,e.clientY,str); whoomp(str); buzz(8+Math.round(str*16)); },{passive:true});
addEventListener('pointermove',e=>{ if(e.target!==canvas) return;
  if(e.pointerType==='mouse') setPt('mouse',e.clientX,e.clientY);
  else if(pts.has(e.pointerId)) setPt(e.pointerId,e.clientX,e.clientY); },{passive:true});
function up(e){ endPt(e.pointerType==='mouse'?'mouse':e.pointerId); }
addEventListener('pointerup',up,{passive:true}); addEventListener('pointercancel',up,{passive:true});
addEventListener('pointerout',e=>{ if(e.pointerType==='mouse') endPt('mouse'); },{passive:true});

const sizeEl=document.getElementById('size'), track=document.getElementById('track'), fill=document.getElementById('fill'), knob=document.getElementById('knob');
function setR(v,preview){ R=clamp(v,CONFIG.R_MIN,CONFIG.R_MAX);
  const t=(R-CONFIG.R_MIN)/(CONFIG.R_MAX-CONFIG.R_MIN); fill.style.width=(t*100)+'%'; knob.style.left=(t*100)+'%';
  if(preview) previewUntil=performance.now()+900; }
function rFromX(cx){ const r=track.getBoundingClientRect(); return CONFIG.R_MIN + clamp((cx-r.left)/r.width,0,1)*(CONFIG.R_MAX-CONFIG.R_MIN); }
let sliding=false;
sizeEl.addEventListener('pointerdown',e=>{ sliding=true; sizeEl.classList.add('active'); try{sizeEl.setPointerCapture(e.pointerId);}catch(_){}
  setR(rFromX(e.clientX),true); e.stopPropagation(); });
sizeEl.addEventListener('pointermove',e=>{ if(sliding){ setR(rFromX(e.clientX),true); e.stopPropagation(); } });
function sEnd(){ sliding=false; sizeEl.classList.remove('active'); }
sizeEl.addEventListener('pointerup',sEnd); sizeEl.addEventListener('pointercancel',sEnd);

const sndBtn=document.getElementById('snd');
sndBtn.addEventListener('click',()=>{ muted=!muted; sndBtn.classList.toggle('off',muted);
  sndBtn.textContent=muted?'✕':'♪'; if(!muted) initAudio(); });

['gesturestart','gesturechange','gestureend'].forEach(g=>addEventListener(g,e=>e.preventDefault()));
addEventListener('dblclick',e=>e.preventDefault());
addEventListener('resize',resize); addEventListener('orientationchange',()=>setTimeout(resize,250));
setTimeout(hideHint,9000);

setR(CONFIG.CLEAR_RADIUS,false);
sprite.onload=()=>{ resize(); requestAnimationFrame(frame); };
if(sprite.complete&&sprite.naturalWidth) sprite.onload();
</script>
