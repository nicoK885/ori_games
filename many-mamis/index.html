<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#06050f">
<meta name="description" content="Many Mamis – das ruhige Schwarmspiel mit drei Mami-Posen und der Physik von Many Oris V3.">
<title>Many Mamis – wird geladen</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#06050f;color:#ddd8f6;font:700 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{display:grid;place-items:center;text-align:center}#loading{max-width:80vw;line-height:1.5;opacity:.75}
</style>
</head>
<body>
<div id="loading">Die Mamis werden vorbereitet …</div>
<script src="./pose1.js?v=3"></script><script src="./pose2.js?v=3"></script><script src="./pose3.js?v=3"></script>
<script>
(async()=>{
  const loading=document.getElementById('loading');
  function patch(source,pattern,replacement,label){
    const result=source.replace(pattern,replacement);
    if(result===source)throw new Error('Patch fehlgeschlagen: '+label);
    return result;
  }
  try{
    const sources=(window.MANY_MAMIS_POSES||[]).slice(0,3);
    if(sources.length!==3)throw new Error('Die drei Mami-Posen fehlen.');
    const images=await Promise.all(sources.map(src=>new Promise((resolve,reject)=>{
      const image=new Image();image.onload=()=>resolve(image);image.onerror=reject;image.src=src;
    })));
    const atlasCanvas=document.createElement('canvas');atlasCanvas.width=540;atlasCanvas.height=360;
    const atlasContext=atlasCanvas.getContext('2d');atlasContext.clearRect(0,0,540,360);
    images.forEach((image,index)=>atlasContext.drawImage(image,index*180,0,180,360));
    window.MANY_MAMIS_ATLAS=atlasCanvas.toDataURL('image/png');

    const response=await fetch('../many_oris_v2/index.html?v=20260627-6',{cache:'no-store'});
    if(!response.ok)throw new Error('Many Oris V2 konnte nicht geladen werden ('+response.status+').');
    let html=await response.text();

    html=patch(html,'<title>In der Menge</title>','<title>Many Mamis</title>','Titel');
    html=patch(html,'Zieh den Schwarm — oder löse unten eine Fähigkeit aus.','Fahre ruhig durch die Menge – die Mamis gleiten weich zur Seite.','Hinweis');
    html=patch(html,'const FW=198, CH=320, ANGRY=4;','const FW=180, CH=360, ANGRY=2;','Atlas-Grösse');
    html=patch(html,'const FRAMES=[0,1,2,3,4].map(i=>({sx:4+i*202,sy:0,sw:FW,sh:CH}));','const FRAMES=[0,1,2].map(i=>({sx:i*180,sy:0,sw:FW,sh:CH}));','Atlas-Frames');
    html=patch(html,'const POSE_WEIGHTS=[0.64,0.11,0.12,0.13];','const POSE_WEIGHTS=[0.36,0.34,0.30];','Posen');

    const spriteLoader="const sprite=new Image(); sprite.src=window.MANY_MAMIS_ATLAS;";
    html=patch(html,/const sprite=new Image\(\); sprite\.src="data:image\/png;base64,[^"]+";/,spriteLoader,'Sprite');
    html=patch(html,"const canvas=document.getElementById('c'); const ctx=canvas.getContext('2d');","const canvas=document.getElementById('c'); const ctx=canvas.getContext('2d'); ctx.imageSmoothingEnabled=true; try{ctx.imageSmoothingQuality='high';}catch(e){}",'Bildqualität');

    html=patch(html,'FOLLOW: [0.080, 0.190], OPEN_EASE: 0.16,','FOLLOW: [0.050, 0.105], OPEN_EASE: 0.08,','Ruhige Reaktion');
    html=patch(html,'REACH: 2.3,','REACH: 2.45,','Reichweite');
    html=patch(html,'BOW: 0.5,','BOW: 0.0,','Bugwelle deaktivieren');
    html=patch(html,'BOW_MIN: 1.5,','BOW_MIN: Infinity,','Bugwellen-Schwelle');
    html=patch(html,'let dx=baseX-p.x, dy=baseY-p.y, d=Math.hypot(dx,dy);','let dx=baseX-p.x, dy=(baseY-c.dh*0.48)-p.y, d=Math.hypot(dx,dy);','Ganzkörper-Trefferzone');
    html=patch(html,'const disp=(Math.sqrt(d*d+rr*rr)-d) * fall * c.dodge;','const disp=(Math.sqrt(d*d+rr*rr)-d) * fall * (0.42+c.dodge*0.06);','Sanfte Verdrängung');
    html=patch(html,
      'const dvx=(tx-c.x)*c.follow, dvy=(ty-c.y)*c.follow;\n    c.velx+=(dvx-c.velx)*c.inert; c.vely+=(dvy-c.vely)*c.inert;',
      `const dvx=(tx-c.x)*c.follow, dvy=(ty-c.y)*c.follow;
    const urgency=clamp(maxDisp/Math.max(1,Reff),0,1),response=c.inert*0.42+urgency*0.018;
    c.velx+=(dvx-c.velx)*response; c.vely+=(dvy-c.vely)*response;`,
      'Weicher Impuls');
    html=patch(html,
      'const ph=now*0.00045, ph2=now*0.0009, maxS=Math.max(24,R*0.54), REACH=CONFIG.REACH;',
      'const ph=now*0.00045, ph2=now*0.0009, maxS=Math.max(12,R*0.24), REACH=CONFIG.REACH;',
      'Maximale Geschwindigkeit');

    html=patch(html,
      `function setPt(key,x,y){ lastAimX=x; lastAimY=y; const p=pts.get(key);
  if(p){ p.vx=(x-p.x)*0.5+p.vx*0.5; p.vy=(y-p.y)*0.5+p.vy*0.5; p.x=x; p.y=y; p.tgt=1; }
  else pts.set(key,{x,y,vx:0,vy:0,str:0,tgt:1}); }`,
      `function setPt(key,x,y){ lastAimX=x; lastAimY=y; const p=pts.get(key);
  if(p){ p.rawX=x; p.rawY=y; p.tgt=1; }
  else pts.set(key,{x,y,rawX:x,rawY:y,vx:0,vy:0,str:0,tgt:1}); }`,
      'Pointer-Ziel');
    html=patch(html,
      `for(const [k,p] of pts){ p.str+=(p.tgt-p.str)*CONFIG.OPEN_EASE; if(p.tgt===0&&p.str<0.02) pts.delete(k);
    p.vx*=0.86; p.vy*=0.86; }`,
      `for(const [k,p] of pts){
    const rawX=p.rawX===undefined?p.x:p.rawX, rawY=p.rawY===undefined?p.y:p.rawY;
    const prevX=p.x, prevY=p.y;
    p.x+=(rawX-p.x)*0.18; p.y+=(rawY-p.y)*0.18;
    const moveX=p.x-prevX, moveY=p.y-prevY;
    p.vx+=(moveX-p.vx)*0.20; p.vy+=(moveY-p.vy)*0.20;
    p.str+=(p.tgt-p.str)*CONFIG.OPEN_EASE;
    if(p.tgt===0&&p.str<0.02) pts.delete(k);
  }`,
      'Pointer-Filter');

    html=patch(html,
      `addEventListener('pointerdown',e=>{ if(e.target!==canvas) return; hideHint(); initAudio(); firstTouch=true;
  setPt(e.pointerType==='mouse'?'mouse':e.pointerId,e.clientX,e.clientY);
  // Stärke variiert je Tap: leichte Zufallswürze + Druck (falls vorhanden) + Combo bei schnellen Taps
  let str = 0.34 + Math.random()*0.34;
  if(e.pressure>0.01 && Math.abs(e.pressure-0.5)>0.001) str *= (0.55+e.pressure*0.95);
  const tnow=performance.now();
  if(tnow-lastTap<450 && Math.hypot(e.clientX-lastTapX,e.clientY-lastTapY)<120) combo=Math.min(combo+1,4); else combo=0;
  str *= (1+combo*0.18); str=clamp(str,0.22,1.1);
  lastTap=tnow; lastTapX=e.clientX; lastTapY=e.clientY;
  spawnShock(e.clientX,e.clientY,str); whoomp(str); buzz(8+Math.round(str*16)); },{passive:true});`,
      `addEventListener('pointerdown',e=>{ if(e.target!==canvas) return; hideHint(); initAudio(); firstTouch=true;
  setPt(e.pointerType==='mouse'?'mouse':e.pointerId,e.clientX,e.clientY); },{passive:true});`,
      'Keine Touch-Welle');
    html=patch(html,
      `if(!firstTouch && now>nextInvite){ spawnShock(W/2,H*0.52,0.5); nextInvite=now+3600; }  // Lockruf`,
      `if(!firstTouch && now>nextInvite){ nextInvite=now+3600; }  // keine automatische Welle`,
      'Keine automatische Welle');

    html=html.replace('</head>','<style>html,body{background:#06050f!important}canvas{background:#06050f}</style></head>');

    document.open();document.write(html);document.close();
  }catch(error){console.error(error);loading.textContent='Das Spiel konnte nicht geladen werden. Bitte die Seite neu laden.'}
})();
</script>
</body>
</html>
